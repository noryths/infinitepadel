<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Infinite Padel</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --padel-blue: #0077b6; --dark-blue: #03045e; --white: #ffffff; --bg-gray: #f4f6f8; --neon-red: #ff003c; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: var(--bg-gray); display: flex; flex-direction: column; min-height: 100vh; }
        
        nav { display: flex; justify-content: space-between; align-items: center; background-color: var(--dark-blue); padding: 10px 50px; color: var(--white); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo img { height: 70px; }
        .menu-toggle { display: none; font-size: 2rem; cursor: pointer; color: var(--white); }
        .nav-links-container { display: flex; width: 100%; justify-content: flex-end; gap: 30px;}
        .nav-links-container a { color: white; text-decoration: none; font-weight: bold; text-transform: uppercase;}

        .auth-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: var(--white); width: 100%; max-width: 500px; border-radius: 20px; padding: 40px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        .auth-form { display: none; } .auth-form.active { display: block; }
        .auth-box h2 { color: var(--dark-blue); font-size: 2rem; margin-bottom: 20px; text-align: center; }
        .input-group input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 10px; margin-bottom: 15px;}
        .auth-btn { width: 100%; background: var(--padel-blue); color: var(--white); border: none; padding: 15px; border-radius: 10px; font-size: 1.2rem; font-weight: bold; cursor: pointer; }
        .switch-mode { text-align: center; margin-top: 20px; } .switch-mode span { color: var(--neon-red); cursor: pointer; font-weight: bold; }
        .error-msg { color: var(--neon-red); text-align: center; margin-bottom: 10px; display: none; }

        @media (max-width: 900px) {
            nav { padding: 15px 20px; }
            .menu-toggle { display: block; }
            .nav-links-container { display: none; flex-direction: column; position: absolute; top: 100%; left: 0; width: 100%; background: var(--dark-blue); padding: 20px; text-align: center; z-index: 1000;}
            .nav-links-container.active { display: flex; }
            .auth-box { padding: 25px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><a href="index.html"><img src="logononaggiustato-removebg-preview.png" alt="Logo"></a></div>
        <div class="menu-toggle" onclick="document.getElementById('mobile-menu').classList.toggle('active')">☰</div>
        <div class="nav-links-container" id="mobile-menu">
            <a href="index.html">Home</a> <a href="prodotti.html">Prodotti</a>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-box">
            <div id="login-form" class="auth-form active">
                <h2>Login</h2>
                <div class="error-msg" id="login-error">Errore</div>
                <div class="input-group"><input type="text" id="log-user" placeholder="Utente"></div>
                <div class="input-group"><input type="password" id="log-pass" placeholder="Password"></div>
                <button class="auth-btn" onclick="doLogin()">Accedi</button>
                <div class="switch-mode">Nuovo? <span onclick="switchForm('register')">Registrati</span></div>
            </div>

            <div id="register-form" class="auth-form">
                <h2>Registrati</h2>
                <div class="error-msg" id="reg-error">Errore</div>
                <div class="input-group"><input type="text" id="reg-nome" placeholder="Nome"></div>
                <div class="input-group"><input type="text" id="reg-user" placeholder="Utente"></div>
                <div class="input-group"><input type="password" id="reg-pass" placeholder="Password"></div>
                <button class="auth-btn" onclick="doRegister()">Crea Account</button>
                <div class="switch-mode">Già iscritto? <span onclick="switchForm('login')">Accedi</span></div>
            </div>
        </div>
    </div>

    <script>
        function switchForm(type) {
            document.getElementById('login-form').classList.remove('active'); document.getElementById('register-form').classList.remove('active');
            document.getElementById(type + '-form').classList.add('active');
        }

        function doRegister() {
            const u = document.getElementById('reg-user').value; const p = document.getElementById('reg-pass').value;
            let db = JSON.parse(localStorage.getItem('infinite_users_db')) || [];
            db.push({ username: u, password: p, nome: document.getElementById('reg-nome').value });
            localStorage.setItem('infinite_users_db', JSON.stringify(db)); localStorage.setItem('infinite_logged_in', u);
            window.location.href = 'index.html';
        }

        function doLogin() {
            const u = document.getElementById('log-user').value; const p = document.getElementById('log-pass').value;
            let db = JSON.parse(localStorage.getItem('infinite_users_db')) || [];
            if(db.find(x => x.username === u && x.password === p)) {
                localStorage.setItem('infinite_logged_in', u);
                if(u === 'admin321') localStorage.setItem('show_admin_greeting', 'true');
                window.location.href = 'index.html';
            } else document.getElementById('login-error').style.display = 'block';
        }
    </script>
</body>
</html>
