<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrello | Infinite Padel</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --padel-blue: #0077b6; --padel-light: #00b4d8; --dark-blue: #03045e; --white: #ffffff; --bg-gray: #f4f6f8; --neon-red: #ff003c; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: var(--bg-gray); color: #333; opacity: 0; animation: fadeInPage 0.5s ease-out forwards; }
        a { text-decoration: none; color: inherit; }
        @keyframes fadeInPage { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        body.fade-out { opacity: 0; transform: translateY(-15px); transition: opacity 0.4s ease-in, transform 0.4s ease-in; }

        /* ================= NAVBAR (RESPONSIVE) ================= */
        nav { display: flex; justify-content: space-between; align-items: center; background-color: var(--dark-blue); padding: 10px 50px; color: var(--white); position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo img { height: 70px; transition: transform 0.3s; cursor: pointer; }
        .menu-toggle { display: none; font-size: 2rem; cursor: pointer; color: var(--white); }
        .nav-links-container { display: flex; width: 100%; justify-content: space-between; align-items: center; margin-left: 40px;}
        .nav-side { display: flex; align-items: center; gap: 30px; font-weight: 700; text-transform: uppercase; font-size: 1rem; }
        .nav-side a { transition: 0.3s; }
        .icon-btn { display: flex; align-items: center; justify-content: center; position: relative; padding: 8px; border-radius: 50%; background: var(--padel-blue); }
        .icon-btn svg { width: 24px; height: 24px; fill: var(--white); }
        .cart-badge { position: absolute; top: -5px; right: -5px; background: var(--neon-red); color: var(--white); font-size: 0.7rem; font-weight: 900; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }

        .cart-section { max-width: 1200px; margin: 50px auto; padding: 0 20px; min-height: 60vh;}
        .section-title { font-size: 2.5rem; color: var(--dark-blue); text-transform: uppercase; border-bottom: 3px solid var(--padel-light); padding-bottom: 10px; margin-bottom: 40px; }
        .cart-container { display: flex; gap: 40px; align-items: flex-start; }
        
        .cart-items { width: 65%; background: var(--white); border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .cart-item { display: flex; align-items: center; justify-content: space-between; padding-bottom: 20px; margin-bottom: 20px; border-bottom: 1px solid #eee; }
        .item-info { display: flex; align-items: center; gap: 20px; width: 60%; }
        .item-img { width: 80px; height: 80px; object-fit: contain; background: var(--bg-gray); border-radius: 10px; padding: 10px; }
        .item-price { font-size: 1.2rem; font-weight: 900; color: var(--padel-blue); width: 100px; text-align: right; }
        .remove-btn { background: none; border: none; color: #aaa; cursor: pointer; font-size: 1.5rem; transition: 0.3s; }
        .remove-btn:hover { color: var(--neon-red); transform: scale(1.1); }
        .empty-msg { text-align: center; color: #777; font-size: 1.2rem; padding: 40px 0; }

        .cart-summary { width: 35%; background: var(--white); border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); position: sticky; top: 120px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 1.1rem; }
        .summary-row.total { border-top: 2px solid #eee; padding-top: 15px; font-size: 1.5rem; font-weight: 900; color: var(--padel-blue); margin-top: 10px; }
        .checkout-btn { width: 100%; background: var(--neon-red); color: var(--white); border: none; padding: 18px; border-radius: 8px; font-size: 1.2rem; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 20px; }

        .checkout-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 3000; opacity: 0; transition: 0.4s; overflow-y: auto;}
        .checkout-overlay.active { display: flex; opacity: 1; }
        .checkout-box { background: var(--white); border-radius: 20px; width: 600px; max-width: 95%; padding: 40px; position: relative; margin: auto;}
        .close-chk-btn { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; color: #888;}
        .checkout-step { display: none; animation: fadeInPage 0.4s; }
        .checkout-step.active { display: block; }
        .input-group input { width: 100%; padding: 15px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 15px;}
        .form-row { display: flex; gap: 15px; }
        .quick-pay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .pay-btn { background: #fff; border: 2px solid #ddd; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        @media (max-width: 900px) {
            nav { padding: 15px 20px; }
            .menu-toggle { display: block; }
            .nav-links-container { display: none; flex-direction: column; position: absolute; top: 100%; left: 0; width: 100%; background: var(--dark-blue); padding: 30px 0; gap: 20px; margin-left: 0; }
            .nav-links-container.active { display: flex; }
            .nav-side { flex-direction: column; text-align: center; gap: 20px; }
            
            .cart-container { flex-direction: column; }
            .cart-items, .cart-summary { width: 100%; position: static; }
            .cart-item { flex-direction: column; text-align: center; gap: 15px; }
            .item-info { flex-direction: column; width: 100%; }
            .item-price { width: 100%; text-align: center; }
            .checkout-box { padding: 25px; }
            .form-row, .quick-pay-grid { flex-direction: column; display: flex; }
            .form-row .input-group { width: 100% !important; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><a href="index.html"><img src="logononaggiustato-removebg-preview.png" alt="Logo"></a></div>
        <div class="menu-toggle" onclick="toggleMobileMenu()">☰</div>
        <div class="nav-links-container" id="mobile-menu">
            <div class="nav-side">
                <a href="index.html">Home</a><a href="prodotti.html">Prodotti</a>
            </div>
            <div class="nav-side">
                <a href="carrello.html" class="icon-btn">
                    <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
                    <span class="cart-badge" id="badge-count">0</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="cart-section">
        <h2 class="section-title">Il tuo Carrello</h2>
        <div class="cart-container">
            <div class="cart-items" id="cart-items-container"></div>
            <div class="cart-summary">
                <h3>Riepilogo</h3>
                <div class="summary-row"><span>Subtotale</span><span id="subtotal-val">€ 0.00</span></div>
                <div class="summary-row" id="discount-row" style="display: none; color:var(--neon-red); font-weight:bold;">
                    <span id="discount-name">Sconto</span><span id="discount-val">- € 0.00</span>
                </div>
                <div class="summary-row total"><span>Totale</span><span id="total-val">€ 0.00</span></div>
                <button class="checkout-btn" onclick="openCheckout()" id="checkout-trigger-btn">Checkout</button>
            </div>
        </div>
    </div>

    <!-- MODALE CHECKOUT -->
    <div class="checkout-overlay" id="checkoutModal">
        <div class="checkout-box">
            <span class="close-chk-btn" onclick="closeCheckout()">✕</span>
            <div class="checkout-step active" id="step1">
                <h2>Pagamento</h2>
                <div class="input-group"><input type="text" placeholder="Numero Carta"></div>
                <div class="form-row"><div class="input-group" style="width: 50%;"><input type="text" placeholder="MM/AA"></div><div class="input-group" style="width: 50%;"><input type="text" placeholder="CVV"></div></div>
                <button class="checkout-btn" style="margin-top:0;" onclick="goToStep2('Carta')">Avanti</button>
                <div style="text-align:center; margin:20px 0;">OPPURE</div>
                <div class="quick-pay-grid">
                    <button class="pay-btn" onclick="goToStep2('PayPal')">PayPal</button><button class="pay-btn" onclick="goToStep2('Apple Pay')">Apple Pay</button>
                </div>
            </div>
            <div class="checkout-step" id="step2">
                <h2>Spedizione</h2>
                <div class="form-row"><div class="input-group" style="width: 50%;"><input type="text" placeholder="Nome"></div><div class="input-group" style="width: 50%;"><input type="text" placeholder="Cognome"></div></div>
                <div class="input-group"><input type="text" placeholder="Indirizzo"></div>
                <button class="checkout-btn" onclick="confirmPurchase()">Conferma Acquisto</button>
            </div>
            <div class="checkout-step" id="step3">
                <h2 style="color:green;">✓ Confermato!</h2><p style="text-align:center;">Reindirizzamento...</p>
            </div>
        </div>
    </div>

    <script>
        function toggleMobileMenu() { document.getElementById('mobile-menu').classList.toggle('active'); }

        document.addEventListener('DOMContentLoaded', () => { renderCart(); });

        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('infinite_cart')) || [];
            const container = document.getElementById('cart-items-container');
            document.getElementById('badge-count').innerText = cart.length;
            container.innerHTML = '';
            if (cart.length === 0) { container.innerHTML = '<div class="empty-msg">Vuoto.</div>'; document.getElementById('checkout-trigger-btn').style.display = 'none'; updateTotals(0, cart); return; }
            document.getElementById('checkout-trigger-btn').style.display = 'block';
            let subtotal = 0;
            cart.forEach((item, index) => {
                subtotal += item.price;
                container.innerHTML += `<div class="cart-item"><div class="item-info"><img src="${item.img}" class="item-img"><h4>${item.name}</h4></div><div class="item-price">€ ${item.price.toFixed(2)}</div><button class="remove-btn" onclick="removeItem(${index})">✕</button></div>`;
            });
            updateTotals(subtotal, cart);
        }

        function removeItem(index) { let cart = JSON.parse(localStorage.getItem('infinite_cart')); cart.splice(index, 1); localStorage.setItem('infinite_cart', JSON.stringify(cart)); renderCart(); }

        function updateTotals(subtotal, cart) {
            document.getElementById('subtotal-val').innerText = `€ ${subtotal.toFixed(2)}`;
            let dPct = 0;
            if (cart.some(i=>i.type==='racchetta') && cart.some(i=>i.type==='borsa') && cart.some(i=>i.type==='grip')) dPct = 0.12;
            else if (cart.some(i=>i.type==='racchetta') && (cart.some(i=>i.type==='borsa') || cart.some(i=>i.type==='grip'))) dPct = 0.10;
            
            let total = subtotal;
            if (dPct > 0) {
                total = subtotal - (subtotal * dPct);
                document.getElementById('discount-row').style.display = 'flex';
                document.getElementById('discount-val').innerText = `- € ${(subtotal * dPct).toFixed(2)}`;
            } else document.getElementById('discount-row').style.display = 'none';
            document.getElementById('total-val').innerText = `€ ${total.toFixed(2)}`;
        }

        function openCheckout() { if(!localStorage.getItem('infinite_logged_in')) { alert("Accedi prima!"); window.location.href='login.html'; return; } document.getElementById('checkoutModal').classList.add('active'); document.getElementById('step1').classList.add('active'); }
        function closeCheckout() { document.getElementById('checkoutModal').classList.remove('active'); }
        function goToStep2() { document.getElementById('step1').classList.remove('active'); document.getElementById('step2').classList.add('active'); }
        function confirmPurchase() { document.getElementById('step2').classList.remove('active'); document.getElementById('step3').classList.add('active'); localStorage.removeItem('infinite_cart'); setTimeout(() => window.location.href = 'index.html', 2000); }
    </script>
</body>
</html>
